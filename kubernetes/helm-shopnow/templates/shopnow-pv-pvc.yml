apiVersion: v1
kind: PersistentVolume
metadata:
  name: database-persistent-volume
  namespace: shopnow
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: "/data/db"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: database-persistent-volume-claim
  namespace: shopnow
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
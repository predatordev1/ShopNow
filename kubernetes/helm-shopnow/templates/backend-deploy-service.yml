apiVersion: apps/v1
kind: Deployment
metadata:
  name: shopnow-backend-deployment
  namespace: shopnow
spec:
  replicas: {{ .Values.backend.replicacount }}
  selector:
    matchLabels:
      component: shopnow-backend
  template:
    metadata:
      labels:
        component: shopnow-backend
    spec:
      imagePullSecrets:
        - name: ecr-secret
      containers:
        - name: shopnow-backend-deployment
          image: "{{ .Values.ecr_repo_backend }}:{{ .Values.backend.image.tag}}"
          ports:
            - containerPort: {{ .Values.configmap.BACKEND_PORT }}
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: shopnow-configmap
                  key: BACKEND_PORT
            - name: MONGODB_URI
              valueFrom:
                configMapKeyRef:
                  name: shopnow-configmap
                  key: MONGODB_URI
            - name: USER_NAME
              valueFrom:
                configMapKeyRef:
                  name: shopnow-configmap
                  key: USER_NAME
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 3
            timeoutSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: shopnow-backend-service
  namespace: shopnow
spec:
  selector:
    component: shopnow-backend
  ports:
    - port: {{ .Values.configmap.BACKEND_PORT }}
      targetPort: {{ .Values.configmap.BACKEND_PORT }}
  type: ClusterIP 
services:
  mongo:
    image: mongo:6
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  admin:
    build:
      context: ./admin
      args:
        USER_NAME: "Devendra"
        PUBLIC_URL: "/"
        REACT_APP_API_BASE_URL: "/api"
    depends_on:
      - mongo
      - backend
    environment:
      - PORT=80
      - MONGODB_URI=mongodb://mongo:27017/${MONGO_DB:-shopnow}
    ports:
      - "${ADMIN_PORT:-80}:80"

  backend:
    build:
      context: ./backend
      args:
        USER_NAME: "Devendra"
    depends_on:
      - mongo
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongo:27017/${MONGO_DB:-shopnow}  # ← add this
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s

  frontend:
    build:
      context: ./frontend
      args:
        USER_NAME: "Devendra"
        PUBLIC_URL: "/"
        REACT_APP_API_BASE_URL: "/api"
    depends_on:
      - mongo
      - admin
      - backend
    ports:
      - "3000:80"

volumes:
  mongo-data: